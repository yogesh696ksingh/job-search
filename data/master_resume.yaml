# ─────────────────────────────────────────────
# Master résumé — RenderCV YAML format.
# Keep ALL your experience here; the AI will
# select and rewrite the most relevant bullets
# for each specific job posting.
# ─────────────────────────────────────────────

cv:
  name: "Your Name"
  location: "San Francisco, CA"
  email: "you@example.com"
  phone: "+1-555-000-0000"
  website: "https://yoursite.com"
  social_networks:
    - network: LinkedIn
      username: yourprofile
    - network: GitHub
      username: yourusername

  sections:
