             and caching strategies."
          - "Created data-quality monitoring framework that caught 15 % of
             upstream schema regressions automatically."

      - company: "Gamma Labs (Internship)"
        position: "Software Engineering Intern"
        start_date: "2018-05"
        end_date: "2018-08"
        location: "Austin, TX"
        highlights:
          - "Prototyped a recommendation engine using collaborative filtering;
             A/B test showed +8 % click-through."
          - "Wrote Python scripts to automate ETL from S3 → Redshift, saving
             4 h/week of manual work."

    projects:
      - name: "OpenMetrics Exporter"
        date: "2023"
        highlights:
          - "Open-source Prometheus exporter for PostgreSQL slow-query analysis;
             800+ GitHub stars."
          - "Used by 3 Fortune-500 companies in production."

      - name: "StreamFilter"
        date: "2022"
        highlights:
          - "Real-time anomaly-detection library for Kafka streams (Python);
             published to PyPI."

    education:
      - institution: "State University"
        area: "Computer Science"
        degree: "B.S."
        start_date: "2015-09"
        end_date: "2019-05"
        highlights:
          - "GPA: 3.8 / 4.0"
          - "Relevant coursework: Distributed Systems, Machine Learning,
             Algorithms, Databases"

    skills:
      - label: "Languages"
        details: "Python, Go, TypeScript, SQL, Bash"
      - label: "Infrastructure"
        details: "AWS (EKS, RDS, S3, Lambda), Kubernetes, Terraform, Docker"
      - label: "Data & Streaming"
        details: "Kafka, Spark, PostgreSQL, Redis, Elasticsearch"
      - label: "ML / AI"
        details: "PyTorch, scikit-learn, MLflow, feature stores"
      - label: "Observability"
        details: "Prometheus, Grafana, Datadog, OpenTelemetry"
