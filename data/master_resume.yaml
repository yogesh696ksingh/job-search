        position: "Senior Software Engineer — Platform"
        start_date: "2022-01"
        end_date: "present"
        location: "San Francisco, CA (remote)"
        highlights:
          - "Designed and shipped a multi-tenant job-scheduling service handling
             50k tasks/day on Kubernetes, reducing p99 latency by 40 %."
          - "Led migration of 15 microservices from EC2 to EKS, cutting infra
             costs by $120k/year."
          - "Built an internal ML feature-store backed by PostgreSQL + Redis,
             serving 200 models in production."
          - "Mentored 3 junior engineers; drove adoption of shared platform
             libraries across 8 teams."

      - company: "Beta Startup"
        position: "Software Engineer — Backend"
        start_date: "2019-06"
        end_date: "2021-12"
        location: "New York, NY"
        highlights:
